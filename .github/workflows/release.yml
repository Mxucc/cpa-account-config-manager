name: Release Plugin

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z tag to build or repair
        required: true

permissions:
  contents: write

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "invalid release tag: ${tag}" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Verify release
        run: make verify VERSION=${{ steps.release.outputs.version }}

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: so
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            ext: so
          - goos: darwin
            goarch: arm64
            runner: macos-15
            ext: dylib
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: dll

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build embedded UI
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build native plugin
        shell: bash
        env:
          CGO_ENABLED: "1"
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          mkdir -p dist
          go build \
            -buildvcs=false \
            -ldflags "-X cpa-account-config-manager/internal/manager.PluginVersion=${VERSION} -X cpa-account-config-manager/internal/manager.PluginRepository=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -buildmode=c-shared \
            -o "dist/cpa-account-config-manager.${{ matrix.ext }}" \
            .

      - name: Verify target platform
        shell: bash
        run: |
          go version -m "dist/cpa-account-config-manager.${{ matrix.ext }}" | tee build-info.txt
          grep -q "GOOS=${{ matrix.goos }}" build-info.txt
          grep -q "GOARCH=${{ matrix.goarch }}" build-info.txt

      - name: Package release archive
        shell: bash
        run: |
          go run ./cmd/releasepack \
            -version "${{ steps.release.outputs.version }}" \
            -goos "${{ matrix.goos }}" \
            -goarch "${{ matrix.goarch }}" \
            -library "dist/cpa-account-config-manager.${{ matrix.ext }}" \
            -out dist/release

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: cpa-account-config-manager-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/release/*.zip
            dist/release/*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Checkout annotated release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Read release notes from tag
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if [[ "$(git cat-file -t "${RELEASE_TAG}")" != "tag" ]]; then
            echo "release tag must be annotated: ${RELEASE_TAG}" >&2
            exit 1
          fi
          git for-each-ref --format='%(contents)' "refs/tags/${RELEASE_TAG}" > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "annotated release tag has no release notes: ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: assets
          merge-multiple: true

      - name: Generate aggregate checksums
        shell: bash
        run: |
          cd assets
          sha256sum *.zip > checksums.txt
          cat checksums.txt

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "CPA Account Config Manager ${RELEASE_TAG}" \
              --notes-file release-notes.md
            gh release upload "${RELEASE_TAG}" assets/*.zip assets/*.sha256 assets/checksums.txt --clobber
          else
            gh release create "${RELEASE_TAG}" \
              --title "CPA Account Config Manager ${RELEASE_TAG}" \
              --notes-file release-notes.md \
              assets/*.zip \
              assets/*.sha256 \
              assets/checksums.txt
          fi
